name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os-arch:
          ["linux-amd64", "darwin-amd64", "darwin-arm64", "windows-amd64"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Set environment variables
        run: |
          if [[ "${{ matrix.os-arch }}" == "linux-amd64" ]]; then
            echo "GOOS=linux" >> $GITHUB_ENV
            echo "GOARCH=amd64" >> $GITHUB_ENV
            echo "EXT=" >> $GITHUB_ENV
          elif [[ "${{ matrix.os-arch }}" == "darwin-amd64" ]]; then
            echo "GOOS=darwin" >> $GITHUB_ENV
            echo "GOARCH=amd64" >> $GITHUB_ENV
            echo "EXT=" >> $GITHUB_ENV
          elif [[ "${{ matrix.os-arch }}" == "darwin-arm64" ]]; then
            echo "GOOS=darwin" >> $GITHUB_ENV
            echo "GOARCH=arm64" >> $GITHUB_ENV
            echo "EXT=" >> $GITHUB_ENV
          elif [[ "${{ matrix.os-arch }}" == "windows-amd64" ]]; then
            echo "GOOS=windows" >> $GITHUB_ENV
            echo "GOARCH=amd64" >> $GITHUB_ENV
            echo "EXT=.exe" >> $GITHUB_ENV
          fi

      - name: Set version from tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create config JSON
        run: |
          cat > ./internal/config/config.json <<EOF
          {
            "version": "${{ env.version }}",
            "github_repo_owner": "${{ github.repository_owner }}",
            "github_repo_name": "${{ github.event.repository.name }}",
            "hcl_assumerole_varname": "${{ vars.HCL_ASSUMEROLE_VARNAME }}",
            "default_aws_region": "${{ vars.AWS_REGION }}",
            "default_aws_profile": "${{ vars.AWS_PROFILE }}",
            "tf_cloud_org": "${{ vars.TF_CLOUD_ORG }}"
          }
          EOF

      - name: Build binary
        run: |
          go build -o platform-tool_${{ env.GOOS }}_${{ env.GOARCH }}${{ env.EXT }} ./cmd/platform-tool/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-tool_${{ env.GOOS }}_${{ env.GOARCH }}
          path: platform-tool_${{ env.GOOS }}_${{ env.GOARCH }}${{ env.EXT }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            platform-tool_linux_amd64/platform-tool_linux_amd64
            platform-tool_darwin_amd64/platform-tool_darwin_amd64
            platform-tool_darwin_arm64/platform-tool_darwin_arm64
            platform-tool_windows_amd64/platform-tool_windows_amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
